<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Your Supreme Alignment Account</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0a0f;font-family:'SF Mono','Fira Code','JetBrains Mono',monospace;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0a0f;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background-color:#12121a;border:1px solid #2a2a3e;border-radius:12px;overflow:hidden;">
          <!-- Header gradient bar -->
          <tr>
            <td style="height:2px;background:linear-gradient(90deg,transparent,#06b6d4,transparent);"></td>
          </tr>
          <!-- Logo area -->
          <tr>
            <td align="center" style="padding:40px 40px 20px;">
              <div style="font-size:36px;margin-bottom:8px;">☉</div>
              <h1 style="margin:0;font-size:22px;font-weight:bold;color:#06b6d4;letter-spacing:2px;">SUPREME ALIGNMENT</h1>
              <p style="margin:8px 0 0;font-size:12px;color:#8888a0;">Planetary Hours × Personal Numerology</p>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:20px 40px 10px;">
              <p style="margin:0;font-size:14px;color:#e4e4ef;line-height:1.6;">
                Your account has been created. Confirm your email to activate your personalized alignment dashboard.
              </p>
            </td>
          </tr>
          <!-- CTA Button -->
          <tr>
            <td align="center" style="padding:24px 40px;">
              <a href="{{ .ConfirmationURL }}"
                 style="display:inline-block;padding:14px 36px;background-color:#06b6d4;color:#0a0a0f;font-size:13px;font-weight:bold;text-decoration:none;border-radius:8px;letter-spacing:1.5px;font-family:'SF Mono','Fira Code',monospace;">
                CONFIRM &amp; ENTER
              </a>
            </td>
          </tr>
          <!-- Subtext -->
          <tr>
            <td style="padding:0 40px 32px;">
              <p style="margin:0;font-size:11px;color:#8888a0;line-height:1.6;text-align:center;">
                If you did not create this account, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <!-- Footer gradient bar -->
          <tr>
            <td style="height:1px;background:linear-gradient(90deg,transparent,#2a2a3e,transparent);"></td>
          </tr>
          <!-- Footer -->
          <tr>
            <td align="center" style="padding:20px 40px;">
              <p style="margin:0;font-size:10px;color:#8888a040;">
                Supreme Alignment — Timing is everything.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
